<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="content-language" content="en-us" />
    <meta meta="title" content="Bing Auto Search for Microsoft Rewards" />
    <meta name="description" content="Browser-based Bing auto search bot to earn Microsoft Rewards points." />
    <meta name="robots" content="all" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://gerisonsabino.com/bing_autosearch" />
    <meta property="og:title" content="Bing Auto Search for Microsoft Rewards" />
    <meta property="og:site_name" content="Bing Auto Search for Microsoft Rewards" />
    <meta property="og:description" content="Browser-based Bing auto search bot to earn Microsoft Rewards points." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link type="text/css" rel="stylesheet" href="css/style.css" />
    <link type="text/css" rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.1/css/all.css" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://www.googletagmanager.com/gtag/js?id=G-YXNCPPFVCW" async=""></script>
    <title>Bing Auto Search for Microsoft Rewards</title>
</head>
<body>
    <section id="wrapper" class="m-auto text-center">
        <main>
            <div>
                <button type="button" id="btn-start" class="btn btn-warning btn-lg">
                    <i class="fas fa-play-circle"></i>
                    <strong>Click to Start Auto Search</strong>
                    <hr />
                    <div id="div-settings">Loading Auto Search Settings...</div>
                </button>
                <button type="button" id="btn-stop" class="btn btn-danger btn-lg">
                    <i class="fas fa-stop-circle"></i>
                    <strong>Click to Stop Auto Search <span id="span-progress">(0/35)</span></strong>
                    <hr />
                    <div id="div-timer">Loading Auto Search Timer...</div>
                </button>
            </div>
            <div id="div-bing"></div>
        </main>
        <div class="footer-bar">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modal-help">
                Settings
            </button>
        </div>
    </section>
    <div class="modal fade" id="modal-help" tabindex="-1" aria-labelledby="modal-help" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">SETTINGS</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-lg-12">
                            <div class="form-group pb-3">
                                <strong>Limit</strong>
                                <select class="form-select" id="slc-limit">
                                    <option value="5">05 searches</option>
                                    <option value="10">10 searches</option>
                                    <option value="20">20 searches</option>
                                    <option value="25">25 searches</option>
                                    <option value="30">30 searches</option>
                                    <option value="35" selected="selected">35 searches (default)</option>
                                    <option value="40">40 searches</option>
                                    <option value="45">45 searches</option>
                                    <option value="50">50 searches</option>
                                </select>
                            </div>
                            <div class="form-group pb-3">
                                <strong>Interval</strong>
                                <select class="form-select" id="slc-interval">
                                    <option value="5000">05 seconds</option>
                                    <option value="10000" selected="selected">10 seconds (default)</option>
                                    <option value="15000">15 seconds</option>
                                    <option value="30000">30 seconds</option>
                                    <option value="60000">60 seconds</option>
                                    <option value="9999">10~60 seconds (random)</option>
                                    <option value="120000">02 minutes</option>
                                    <option value="180000">03 minutes</option>
                                    <option value="240000">04 minutes</option>
                                    <option value="300000">05 minutes (recomended for restricted accounts)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <strong>Multi-tab Mode</strong>
                                <select class="form-select" id="slc-multitab">
                                    <option value="true">Enabled</option>
                                    <option value="false" selected="selected">Disabled (default)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="js/script.js" defer></script>
</body>
</html>
